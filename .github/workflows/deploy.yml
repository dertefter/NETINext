name: Deploy to Google Play

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      manual_track:
        description: 'Выберите трек для ручной публикации'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app_wearable/release.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Determine Google Play Track
        id: determine_track
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MOBILE="${{ inputs.manual_track }}"
            WEAR="wear:${{ inputs.manual_track }}"
          else
            TAG="${{ github.ref_name }}"
            if [[ "$TAG" == *"-alpha"* ]]; then
              MOBILE="alpha"
              WEAR="wear:alpha"
            elif [[ "$TAG" == *"-beta"* ]]; then
              MOBILE="beta"
              WEAR="wear:beta"
            else
              MOBILE="production"
              WEAR="wear:production"
            fi
          fi
          
          echo "mobile_track=$MOBILE" >> $GITHUB_OUTPUT
          echo "wear_track=$WEAR" >> $GITHUB_OUTPUT
          
          echo "Determined mobile track: $MOBILE"
          echo "Determined wearable track: $WEAR"

      - name: Build & Sign Release AAB
        run: ./gradlew bundleRelease
        env:
          ANDROID_KEYSTORE_FILE: release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Mobile to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_KEY }}
          packageName: com.dertefter.neticlient
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          status: draft
          tracks: ${{ steps.determine_track.outputs.mobile_track }}

      - name: Upload Wearable to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_KEY }}
          packageName: com.dertefter.neticlient
          releaseFiles: app_wearable/build/outputs/bundle/release/app_wearable-release.aab
          status: draft
          tracks: ${{ steps.determine_track.outputs.wear_track }}
